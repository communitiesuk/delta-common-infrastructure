name: "Run Marklogic AMI build"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to pass to AMI build"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - staging
          - staging1
          - production

jobs:
  deploy-ml-ami:
    concurrency: test-deployment
    name: Run Marklogic AMI build
    runs-on: ubuntu-latest
    steps:
      - name: Use GitHub API to trigger ML AMI build
        run: |
          curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.MARKLOGIC_DEPLOY_TRIGGER_PAT_KEITHKENNEDY }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/communitiesuk/delta-marklogic-deploy/actions/workflows/build-marklogic-ami.yml/dispatches \
          -d '{"ref":"main","inputs":{"environment":"${{ github.event.inputs.environment }}"}}'
