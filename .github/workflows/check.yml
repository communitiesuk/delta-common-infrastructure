name: "Terraform checks"

# Quick checks that run on every PR, regardless of whether any Terraform code changed
# Set as required for PRs to be merged on GitHub

on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  tf_fmt:
    name: Validate Terraform formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.3
      - name: Check formatting of all Terraform files
        run: terraform fmt -check -diff -recursive
  tfsec:
    name: tfsec check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Clone repo
        uses: actions/checkout@v6
      - name: tfsec
        run: docker run --rm -v "${GITHUB_WORKSPACE}:/src:ro" aquasec/tfsec:v1.28.14 /src/terraform
