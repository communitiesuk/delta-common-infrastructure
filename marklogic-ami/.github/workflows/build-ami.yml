# Build MarkLogic AMI with Packer.
# Uses AWS credentials from secrets (or OIDC). Set repository variables for region, VPC, subnet, base AMI.

name: Build MarkLogic AMI

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'AWS region'
        required: false
        default: 'eu-west-1'
      source_ami_id:
        description: 'Base AMI ID'
        required: false
        default: 'ami-01907b01c5d597358'
  push:
    branches: [main]
    paths:
      - 'marklogic-ami.pkr.hcl'
      - 'scripts/**'
      - 'systemd/**'
      - 'config/**'
      - '.github/workflows/build-ami.yml'

env:
  AWS_REGION: ${{ github.event.inputs.region || 'eu-west-1' }}
  PACKER_VPC_ID: ${{ vars.PACKER_VPC_ID || 'vpc-07a867ec880ffb57e' }}
  PACKER_SUBNET_ID: ${{ vars.PACKER_SUBNET_ID || 'subnet-0c7ae48d942c6f7b3' }}
  PACKER_SOURCE_AMI_ID: ${{ github.event.inputs.source_ami_id || 'ami-01907b01c5d597358' }}

jobs:
  build-ami:
    name: Packer build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          # Option A: Use OIDC (recommended). Add AWS role ARN to GitHub repo secrets/variables and uncomment:
          # role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # Option B: Use static credentials. Add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to repo secrets:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@v1
        with:
          packer_version: '1.11.0'

      - name: Packer init
        run: packer init marklogic-ami.pkr.hcl

      - name: Packer build
        run: |
          packer build \
            -var "region=${{ env.AWS_REGION }}" \
            -var "vpc_id=${{ env.PACKER_VPC_ID }}" \
            -var "subnet_id=${{ env.PACKER_SUBNET_ID }}" \
            -var "source_ami_id=${{ env.PACKER_SOURCE_AMI_ID }}" \
            marklogic-ami.pkr.hcl

      - name: Output AMI ID
        if: success()
        run: |
          echo "Build completed. Check the Packer output above for the new AMI ID."
